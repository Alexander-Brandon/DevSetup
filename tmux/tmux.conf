# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 10000
set -g mouse on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (Shift+Alt + vim motion)
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Window navigation
bind -n S-Left previous-window
bind -n S-Right next-window

# Status bar
set -g status-position bottom
set -g status-style "bg=#1e2030,fg=#cad3f5"
set -g status-left "#[bg=#8aadf4,fg=#1e2030,bold] #S #[default] "
set -g status-right "#[fg=#8aadf4] %H:%M #[fg=#cad3f5]%d %b "
set -g status-left-length 30
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[bg=#8aadf4,fg=#1e2030,bold] #I:#W "
